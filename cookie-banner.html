<!-- Jadu Cookie Consent Proof of Concept -->
<style>
  .jc-cookie-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #1f1f1f;
    color: #ffffff;
    padding: 16px;
    z-index: 99999;
    font-family: Arial, sans-serif;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
  }

  .jc-cookie-banner__inner {
    max-width: 960px;
    margin: 0 auto;
  }

  .jc-cookie-banner h2 {
    margin: 0 0 8px;
    font-size: 20px;
  }

  .jc-cookie-banner p {
    margin: 0 0 16px;
    line-height: 1.5;
  }

  .jc-cookie-banner__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .jc-cookie-banner button {
    border: 0;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 16px;
    border-radius: 4px;
  }

  .jc-cookie-banner__accept {
    background: #ffffff;
    color: #000000;
    font-weight: bold;
  }

  .jc-cookie-banner__reject {
    background: #ffffff;
    color: #000000;
    font-weight: bold;
  }

  .jc-cookie-banner__settings {
    display: inline-block;
    margin-top: 12px;
    color: #ffffff;
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: 0;
    padding: 0;
    font-size: 14px;
  }

  .jc-cookie-banner[hidden] {
    display: none;
  }

  .jc-cookie-manage-trigger {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 99998;
    background: #1f1f1f;
    color: #ffffff;
    border: 1px solid #ffffff;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    font-size: 14px;
  }

  .jc-cookie-manage-trigger[hidden] {
    display: none;
  }
</style>

<button type="button" id="jc-cookie-manage" class="jc-cookie-manage-trigger" hidden>Manage Cookies</button>

<div id="jc-cookie-banner" class="jc-cookie-banner" hidden role="region" aria-label="Cookie consent banner">
  <div class="jc-cookie-banner__inner">
    <h2>Cookies on this website</h2>

    <p>We use some essential cookies to make this website work. We'd also like to use analytics cookies and similar technologies to understand how you use the website so we can improve services.</p>

    <div class="jc-cookie-banner__actions">
      <button type="button" id="jc-cookie-accept" class="jc-cookie-banner__accept">Accept analytics cookies</button>

      <button type="button" id="jc-cookie-reject" class="jc-cookie-banner__reject">Reject analytics cookies</button>
    </div>

    <button type="button" id="jc-cookie-settings" class="jc-cookie-banner__settings">Change cookie settings</button>
  </div>
</div>

<script>
  (function () {

    /*
      Ensure banner and trigger are in the body, even if snippet is in the head
    */
    document.addEventListener('DOMContentLoaded', function() {
      var b = document.getElementById('jc-cookie-banner');
      var m = document.getElementById('jc-cookie-manage');
      if (b && b.parentElement !== document.body) {
        document.body.appendChild(b);
      }
      if (m && m.parentElement !== document.body) {
        document.body.appendChild(m);
      }
    });

    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    window.gtag = gtag;

    var STORAGE_KEY = 'jcCookieConsent';

    /*
      ============================================================
      CONFIG
      ============================================================
    */

    var config = {

      /*
        Replace with your real GA4 measurement ID
      */
      googleAnalyticsId: 'G-NHDSE3NWYM',

      /*
        Placeholder hook for future Cludo analytics enablement
      */
      enableCludoAnalytics: function () {
        console.log('Cludo analytics enabled');
      }
    };

    /*
      ============================================================
      HELPERS
      ============================================================
    */

    function getConsent() {

      try {
        return JSON.parse(
          localStorage.getItem(STORAGE_KEY)
        );

      } catch (e) {
        return null;
      }
    }

    function setConsent(analyticsEnabled) {

      var consent = {
        analytics: analyticsEnabled,
        date: new Date().toISOString()
      };

      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(consent)
      );
    }

    /*
      ============================================================
      GOOGLE ANALYTICS LOADER
      ============================================================
    */

    function loadGoogleAnalytics() {

      if (
        !config.googleAnalyticsId ||
        config.googleAnalyticsId === 'G-NHDSE3NWYM'
      ) {

        console.warn(
          'Cookie banner: Replace G-NHDSE3NWYM with your GA4 ID.'
        );

        return;
      }

      /*
        Prevent duplicate loading
      */
      if (window.jcAnalyticsLoaded) {
        return;
      }

      window.jcAnalyticsLoaded = true;

      gtag('js', new Date());

      gtag('config', config.googleAnalyticsId);

      var script = document.createElement('script');

      script.async = true;

      script.src =
        'https://www.googletagmanager.com/gtag/js?id=' +
        encodeURIComponent(config.googleAnalyticsId);

      document.head.appendChild(script);

      console.log('Google Analytics loaded');
    }

    /*
      ============================================================
      ENABLE ANALYTICS
      ============================================================
    */

    function enableAnalytics() {

      loadGoogleAnalytics();

      if (
        typeof config.enableCludoAnalytics === 'function'
      ) {

        config.enableCludoAnalytics();
      }
    }

    /*
      ============================================================
      UI
      ============================================================
    */

    var banner =
      document.getElementById('jc-cookie-banner');

    var acceptButton =
      document.getElementById('jc-cookie-accept');

    var rejectButton =
      document.getElementById('jc-cookie-reject');

    var settingsButton =
      document.getElementById('jc-cookie-settings');

    var manageButton =
      document.getElementById('jc-cookie-manage');

    function showBanner() {
      banner.hidden = false;
      manageButton.hidden = true;
    }

    function hideBanner() {
      banner.hidden = true;
      manageButton.hidden = false;
    }

    /*
      ============================================================
      INITIALISE
      ============================================================
    */

    /*
      GCM v2 - Initial consent check
    */
    var existingConsent = getConsent();

    if (existingConsent && existingConsent.analytics === true) {
      gtag('consent', 'default', {
        'analytics_storage': 'granted',
        'ad_storage': 'granted',
        'ad_user_data': 'granted',
        'ad_personalization': 'granted'
      });
    } else {
      gtag('consent', 'default', {
        'analytics_storage': 'denied',
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied'
      });
    }

    if (!existingConsent) {

      showBanner();

      /*
        Hide settings button when banner already visible
      */
      settingsButton.style.display = 'none';

    } else if (
      existingConsent.analytics === true
    ) {

      enableAnalytics();

      hideBanner();

    } else {

      hideBanner();
    }

    /*
      ============================================================
      EVENTS
      ============================================================
    */

    acceptButton.addEventListener(
      'click',
      function () {

        setConsent(true);

        gtag('consent', 'update', {
          'analytics_storage': 'granted',
          'ad_storage': 'granted',
          'ad_user_data': 'granted',
          'ad_personalization': 'granted'
        });

        enableAnalytics();

        hideBanner();
      }
    );

    rejectButton.addEventListener(
      'click',
      function () {

        setConsent(false);

        gtag('consent', 'update', {
          'analytics_storage': 'denied',
          'ad_storage': 'denied',
          'ad_user_data': 'denied',
          'ad_personalization': 'denied'
        });

        hideBanner();
      }
    );

    settingsButton.addEventListener(
      'click',
      function () {

        localStorage.removeItem(STORAGE_KEY);

        window.location.reload();
      }
    );

    manageButton.addEventListener(
      'click',
      function () {
        showBanner();
      }
    );

  })();
</script>
